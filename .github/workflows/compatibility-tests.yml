name: Compatibility Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  compatibility:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install podman-compose
        run: pip3 install podman-compose==1.2.0

      - name: Start test infrastructure
        run: |
          podman-compose up -d
          sleep 5
          podman ps --format '{{.Names}} {{.Status}}'
          RUNNING=$(podman ps --filter 'status=running' --format '{{.Names}}' | wc -l)
          if [ "$RUNNING" -lt 3 ]; then
            echo "::error::Expected 3 running containers, found $RUNNING"
            podman ps -a
            exit 1
          fi
        timeout-minutes: 10

      - name: Wait for registries
        run: ./wait-for-ready.sh 180
        timeout-minutes: 5

      - name: Run compatibility tests
        run: |
          CONFLUENT_VERSION=$(grep -oP 'cp-schema-registry:\K[0-9]+\.[0-9]+\.[0-9]+' podman-compose.yml)
          mvn clean test -B -Dconfluent.registry.version="$CONFLUENT_VERSION"
        timeout-minutes: 15

      - name: Collect container logs
        if: always()
        run: podman-compose logs || true

      - name: Upload compatibility report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-report
          path: target/compatibility-report.html
          retention-days: 30

      - name: Tear down infrastructure
        if: always()
        run: podman-compose down -v || true

  deploy-pages:
    needs: compatibility
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download compatibility report
        uses: actions/download-artifact@v4
        with:
          name: compatibility-report
          path: report-output

      - name: Rename to index.html
        run: mv report-output/compatibility-report.html report-output/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: report-output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
